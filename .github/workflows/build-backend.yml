name: Build & Deploy Backend Only

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ad_sim-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            cd /home/app/smart_task_offloading
            git pull origin main || true
            export BACKEND_IMAGE=${{ secrets.DOCKER_USERNAME }}/ad_sim-backend:latest
            docker compose pull backend || true
            docker compose up -d --no-deps --force-recreate backend
            docker compose logs --tail=100 backend || true
